<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GenreSorter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1DB954;--bg:#0a0a0a;--card:#141414;--card2:#1c1c1c;--border:#222;--text:#e8e8e8;--muted:#777}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(29,185,84,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(29,185,84,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 18px;text-align:center}
.logo{width:66px;height:66px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 0 48px rgba(29,185,84,.45)}
.logo svg{width:36px;height:36px;fill:#000}
h1{font-family:'Space Mono',monospace;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;line-height:1.1;margin-bottom:10px}
h1 span{color:var(--g)}
.sub{color:var(--muted);font-size:.92rem;max-width:340px;line-height:1.6;margin-bottom:28px}
.box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:500px;width:100%;text-align:left}
.sec-label{font-size:.68rem;color:var(--g);font-family:'Space Mono',monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.step{display:flex;gap:11px;margin-bottom:14px}
.step-n{background:var(--g);color:#000;font-family:'Space Mono',monospace;font-weight:700;font-size:.65rem;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-t{color:var(--muted);font-size:.83rem;line-height:1.55}
.step-t a{color:var(--g)}
.step-t strong{color:var(--text)}
label{display:block;font-size:.7rem;color:var(--muted);margin-bottom:6px;font-family:'Space Mono',monospace;letter-spacing:1px;text-transform:uppercase}
input,textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;margin-bottom:12px}
input:focus,textarea:focus{border-color:var(--g)}
textarea{min-height:80px;resize:vertical;font-family:'Space Mono',monospace;font-size:.76rem}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--g);color:#000;font-family:'Space Mono',monospace;font-weight:700;font-size:.82rem;padding:10px 22px;border-radius:100px;border:none;cursor:pointer;text-decoration:none;transition:opacity .2s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.full{width:100%;justify-content:center}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn.sm{padding:6px 13px;font-size:.75rem}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(–border);position:sticky;top:0;background:rgba(10,10,10,.94);backdrop-filter:blur(12px);z-index:100}
.h-logo{display:flex;align-items:center;gap:9px;font-family:‘Space Mono’,monospace;font-weight:700;font-size:.88rem}
.h-logo-dot{width:26px;height:26px;background:var(–g);border-radius:50%;display:flex;align-items:center;justify-content:center}
.h-logo-dot svg{width:14px;fill:#000}
.h-right{display:flex;align-items:center;gap:9px}
.h-right img{width:25px;height:25px;border-radius:50%}
.h-right span{font-size:.78rem;color:var(–muted)}

/* Main */
main{padding:20px;max-width:1080px;margin:0 auto}
.tabs{display:flex;gap:4px;background:var(–card);border:1px solid var(–border);border-radius:11px;padding:4px;margin-bottom:24px;width:fit-content}
.tab{padding:7px 17px;border-radius:8px;font-family:‘Space Mono’,monospace;font-size:.74rem;cursor:pointer;border:none;background:transparent;color:var(–muted);font-weight:400}
.tab.active{background:var(–g);color:#000;font-weight:700}

/* Playlist grid */
.pl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.pl-card{background:var(–card);border:1px solid var(–border);border-radius:11px;padding:11px;cursor:pointer;position:relative;transition:border-color .15s}
.pl-card.sel{background:rgba(29,185,84,.07);border-color:var(–g)}
.pl-card img,.pl-card .no-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;margin-bottom:8px;display:block;background:var(–card2)}
.pl-card .no-img{display:flex;align-items:center;justify-content:center;font-size:1.7rem}
.pl-card h4{font-size:.78rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.pl-card p{font-size:.68rem;color:var(–muted)}
.check{position:absolute;top:7px;right:7px;background:var(–g);color:#000;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700}

/* Selected panel */
.sel-panel{background:var(–card);border:1px solid var(–border);border-radius:13px;padding:17px;margin-bottom:20px}
.sel-panel .row{display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.sel-panel img,.sel-panel .no-img{width:46px;height:46px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(–card2);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.prog{height:3px;background:var(–card2);border-radius:2px;overflow:hidden;margin:13px 0 5px}
.prog-fill{height:100%;background:var(–g);transition:width .3s}
.prog-msg{font-size:.74rem;color:var(–muted);text-align:center}

/* Genre grid */
.genre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:12px}
.genre-card{background:var(–card);border:1px solid var(–border);border-radius:12px;overflow:hidden}
.genre-head{padding:12px 15px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(–border)}
.genre-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.genre-name{font-family:‘Space Mono’,monospace;font-size:.78rem;font-weight:700;margin-left:7px}
.genre-cnt{background:var(–card2);border:1px solid var(–border);border-radius:100px;padding:2px 8px;font-size:.7rem;color:var(–muted);font-family:‘Space Mono’,monospace}
.genre-tracks{max-height:195px;overflow-y:auto}
.track-row{display:flex;align-items:center;gap:8px;padding:6px 14px}
.track-row img,.track-row .no-art{width:29px;height:29px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(–border)}
.track-info .name{font-size:.76rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-info .artist{font-size:.66rem;color:var(–muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.genre-foot{padding:9px 14px;border-top:1px solid var(–border);display:flex;align-items:center;justify-content:space-between}
.genre-foot span{font-size:.7rem;color:var(–muted)}

/* Chips & tags */
.chip{background:var(–card2);border:1px solid var(–border);border-radius:100px;padding:3px 10px;font-size:.7rem;color:var(–muted);font-family:‘Space Mono’,monospace}
.chip strong{color:var(–g)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.tag{padding:5px 11px;border-radius:100px;border:1px solid var(–border);font-size:.73rem;cursor:pointer;background:transparent;color:var(–muted);font-family:‘DM Sans’,sans-serif}
.tag.active{background:var(–g);border-color:var(–g);color:#000;font-weight:600}

/* Filters */
.filter-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:11px;margin-bottom:17px}
.chips-row{display:flex;gap:7px;flex-wrap:wrap}

/* Empty */
.empty{text-align:center;padding:65px 20px;color:var(–muted)}
.empty .ico{font-size:2.6rem;margin-bottom:11px}
.empty h3{font-family:‘Space Mono’,monospace;font-size:.92rem;color:var(–text);margin-bottom:7px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px}
.modal{background:var(–card);border:1px solid var(–border);border-radius:17px;padding:24px;max-width:410px;width:100%}
.modal h3{font-family:‘Space Mono’,monospace;font-weight:700;font-size:.93rem;margin-bottom:5px}
.modal p{color:var(–muted);font-size:.83rem;margin-bottom:18px}
.modal-btns{display:flex;gap:9px;margin-top:3px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(–card);border-radius:11px;padding:12px 16px;font-size:.82rem;z-index:300;box-shadow:0 8px 26px rgba(0,0,0,.5);max-width:300px;border:1px solid var(–g)}
.toast.err{border-color:#e44}

.info-box{background:#0f0f0f;border:1px solid var(–border);border-radius:8px;padding:10px 13px;margin-bottom:12px;font-size:.76rem;color:var(–muted);line-height:1.5}
.info-box.green{border-color:var(–g)}
.info-box code{font-family:‘Space Mono’,monospace;font-size:.72rem;color:var(–text);word-break:break-all}
</style>

</head>
<body>
<div id="app"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────
const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];
const SCOPES = 'user-read-private playlist-read-private playlist-read-collaborative playlist-modify-public playlist-modify-private';

const GENRE_COLORS = {
  'Pop':'#FF6B9D','Rock / Indie':'#FF8C42','Hip-Hop / Rap':'#C77DFF',
  'R&B / Soul':'#E76F51','Electronic / Dance':'#00F5D4','Jazz':'#FFD166',
  'Classical':'#EF476F','Metal / Punk':'#6D6875','Country / Folk':'#E9C46A',
  'Latin':'#FB5607','K-Pop':'#FF99C8','Reggae':'#06D6A0',
  'Blues':'#118AB2','Afrobeat':'#8AC926','Funk':'#F4A261',
  'Ambient / Chill':'#457B9D','Overig':'#555555'
};

function genreColor(g){ return GENRE_COLORS[g]||'#888'; }

function normalizeGenre(g){
  g=g.toLowerCase().trim();
  if(g.includes('hip hop')||g.includes('hip-hop')||g.includes('rap')) return 'Hip-Hop / Rap';
  if(g.includes('r&b')||g.includes('rnb')||g.includes('soul')) return 'R&B / Soul';
  if(g.includes('pop')) return 'Pop';
  if(g.includes('rock')||g.includes('alternative')||g.includes('indie')) return 'Rock / Indie';
  if(g.includes('electronic')||g.includes('edm')||g.includes('house')||g.includes('techno')||g.includes('dance')||g.includes('electro')) return 'Electronic / Dance';
  if(g.includes('jazz')) return 'Jazz';
  if(g.includes('classical')||g.includes('orchestra')||g.includes('piano')) return 'Classical';
  if(g.includes('metal')||g.includes('punk')||g.includes('hardcore')) return 'Metal / Punk';
  if(g.includes('country')||g.includes('folk')||g.includes('bluegrass')) return 'Country / Folk';
  if(g.includes('latin')||g.includes('reggaeton')||g.includes('salsa')) return 'Latin';
  if(g.includes('k-pop')||g.includes('kpop')||g.includes('korean')) return 'K-Pop';
  if(g.includes('reggae')) return 'Reggae';
  if(g.includes('blues')) return 'Blues';
  if(g.includes('afro')) return 'Afrobeat';
  if(g.includes('funk')) return 'Funk';
  if(g.includes('ambient')||g.includes('chill')||g.includes('lo-fi')||g.includes('lofi')) return 'Ambient / Chill';
  return g.charAt(0).toUpperCase()+g.slice(1);
}

// ── PKCE ────────────────────────────────────────────────────────────
function randStr(n){
  const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const a=new Uint8Array(n); crypto.getRandomValues(a);
  return Array.from(a).map(b=>c[b%c.length]).join('');
}
async function pkceChallenge(v){
  const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// ── Spotify API ─────────────────────────────────────────────────────
async function sf(tok,path,opts={}){
  const url=path.startsWith('https://')?path:'https://api.spotify.com/v1'+path;
  const r=await fetch(url,{...opts,headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error((e.error?.message||'HTTP '+r.status)+' ('+r.status+')');}
  if(r.status===204) return null;
  return r.json();
}
async function fetchAll(tok,path){
  let items=[],next=path;
  while(next){
    const u=next.startsWith('https://api.spotify.com')?next.replace('https://api.spotify.com/v1',''):next;
    const d=await sf(tok,u);
    items=items.concat(d.items||[]);
    next=d.next;
  }
  return items;
}

// ── State ───────────────────────────────────────────────────────────
const S={
  screen:'login', // login | app
  clientId: localStorage.getItem('sp_cid')||'',
  token:null, user:null, playlists:[], selected:null,
  genreMap:{}, tab:'playlists',
  loading:false, loadingMsg:'', progress:0,
  searchQ:'', activeGenre:null,
  modal:null, toast:null, creating:null,
  loginBusy:false,
};

let toastTimer=null;
function showToast(msg,err=false){
  clearTimeout(toastTimer);
  S.toast={msg,err};
  render();
  toastTimer=setTimeout(()=>{S.toast=null;render();},4500);
}

function set(patch){Object.assign(S,patch);render();}

// ── OAuth PKCE ──────────────────────────────────────────────────────
async function startLogin(){
  const id=S.clientId.trim();
  if(!id){showToast('Voer een Client ID in',true);return;}
  localStorage.setItem('sp_cid',id);
  const verifier=randStr(64);
  const challenge=await pkceChallenge(verifier);
  localStorage.setItem('pkce_v',verifier);
  localStorage.setItem('pkce_cid',id);
  const params=new URLSearchParams({
    client_id:id, response_type:'code',
    redirect_uri:REDIRECT_URI, scope:SCOPES,
    code_challenge_method:'S256', code_challenge:challenge
  });
  window.location.href='https://accounts.spotify.com/authorize?'+params;
}

async function handleCallback(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  const err=params.get('error');
  if(err){window.history.replaceState({},'',window.location.pathname);showToast('Spotify fout: '+err,true);return;}
  if(!code) return;

  // Clean URL immediately
  window.history.replaceState({},'',window.location.pathname);

  const verifier=localStorage.getItem('pkce_v');
  const clientId=localStorage.getItem('pkce_cid')||S.clientId;
  if(!verifier){showToast('Sessie verlopen, probeer opnieuw',true);return;}

  set({loginBusy:true, screen:'login'});
  try{
    const body=new URLSearchParams({
      grant_type:'authorization_code', code,
      redirect_uri:REDIRECT_URI, client_id:clientId,
      code_verifier:verifier
    });
    const r=await fetch('https://accounts.spotify.com/api/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:body.toString()
    });
    const data=await r.json();
    if(!data.access_token) throw new Error(data.error_description||'Token mislukt');
    localStorage.removeItem('pkce_v');
    await loadApp(data.access_token);
  }catch(e){
    set({loginBusy:false});
    showToast('Inloggen mislukt: '+e.message,true);
  }
}

async function loadApp(tok){
  set({loading:true,loadingMsg:'Verbinden…'});
  try{
    const me=await sf(tok,'/me');
    const pl=await fetchAll(tok,'/me/playlists?limit=50');
    set({token:tok,user:me,playlists:pl,screen:'app',loading:false,loginBusy:false});
  }catch(e){
    set({loading:false,loginBusy:false});
    showToast('Verbinding mislukt: '+e.message,true);
  }
}

// ── Analyze ─────────────────────────────────────────────────────────
async function analyze(){
  if(!S.selected) return;
  set({loading:true,loadingMsg:'Nummers ophalen…',progress:5,genreMap:{},tab:'genres'});
  try{
    const raw=await fetchAll(S.token,'/playlists/'+S.selected.id+'/tracks?limit=100');
    const tracks=raw.map(i=>i.track).filter(t=>t&&t.id);
    set({loadingMsg:tracks.length+' nummers gevonden…',progress:20});

    const artistIds=[...new Set(tracks.flatMap(t=>t.artists.map(a=>a.id)).filter(Boolean))];
    const artistMap={};
    for(let i=0;i<artistIds.length;i+=50){
      const data=await sf(S.token,'/artists?ids='+artistIds.slice(i,i+50).join(','));
      (data.artists||[]).forEach(a=>{if(a)artistMap[a.id]=a;});
      set({progress:20+Math.min(Math.round(((i+50)/artistIds.length)*50),50),
           loadingMsg:'Genres ophalen… ('+Math.min(i+50,artistIds.length)+'/'+artistIds.length+')'});
    }

    const gm={};
    tracks.forEach(t=>{
      let genres=[];
      t.artists.forEach(a=>{const ar=artistMap[a.id];if(ar?.genres?.length)genres=genres.concat(ar.genres);});
      const primary=genres.length?normalizeGenre(genres[0]):'Overig';
      if(!gm[primary])gm[primary]=[];
      gm[primary].push({...t,allGenres:genres});
    });
    set({genreMap:gm,progress:100,loading:false,loadingMsg:''});
    showToast('✓ '+tracks.length+' nummers → '+Object.keys(gm).length+' genres');
  }catch(e){set({loading:false});showToast('Fout: '+e.message,true);}
}

async function createPlaylist(genre,tracks,name){
  set({creating:genre});
  try{
    const pl=await sf(S.token,'/users/'+S.user.id+'/playlists',{method:'POST',body:JSON.stringify({name,description:'Genre Sorter',public:false})});
    const uris=tracks.map(t=>'spotify:track:'+t.id);
    for(let i=0;i<uris.length;i+=100)
      await sf(S.token,'/playlists/'+pl.id+'/tracks',{method:'POST',body:JSON.stringify({uris:uris.slice(i,i+100)})});
    set({creating:null,modal:null});
    showToast('✓ "'+name+'" aangemaakt!');
  }catch(e){set({creating:null});showToast('Fout: '+e.message,true);}
}

async function createAll(){
  const entries=Object.entries(S.genreMap);
  set({loading:true,progress:5,loadingMsg:'Playlists aanmaken…'});
  for(let i=0;i<entries.length;i++){
    const[genre,tracks]=entries[i];
    await createPlaylist(genre,tracks,(S.selected?.name||'Playlist')+' — '+genre);
    set({progress:Math.round(((i+1)/entries.length)*100),loadingMsg:genre+' ('+(i+1)+'/'+entries.length+')'});
  }
  set({loading:false,loadingMsg:''});
  showToast('✓ Alle '+entries.length+' playlists aangemaakt!');
}

// ── Render ──────────────────────────────────────────────────────────
const spIcon=`<svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 01-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.622.622 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257C14.15 12.226 10.95 11.7 7.004 12.83a.78.78 0 01-.45-1.49c4.379-1.318 8.003-.75 10.999 1.09a.78.78 0 01.256 1.072zm.105-2.837C15.222 9.32 10.973 9.18 8.096 10.027a.936.936 0 11-.543-1.79c3.285-.997 8.047-.804 11.226 1.117a.936.936 0 11-.865 1.51z"/></svg>`;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const app=document.getElementById('app');
  if(!app) return;

  let html='';
  if(S.screen==='login') html=renderLogin();
  else html=renderApp();

  if(S.modal) html+=renderModal();
  if(S.toast) html+=`<div class="toast${S.toast.err?' err':''}">${S.toast.err?'⚠️ ':'✅ '}${esc(S.toast.msg)}</div>`;
  app.innerHTML=html;
  attachEvents();
}

function renderLogin(){
  return `<div class="screen">
    <div class="logo">${spIcon}</div>
    <h1>Genre<span>Sorter</span></h1>
    <p class="sub">Analyseer Spotify playlists op genre en maak automatisch nieuwe afspeellijsten.</p>
    <div class="box">
      <div class="sec-label">Setup (eenmalig)</div>
      <div class="step"><div class="step-n">1</div><div class="step-t">Ga naar <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com/dashboard</a> en maak een nieuwe app aan.</div></div>
      <div class="step"><div class="step-n">2</div><div class="step-t">Ga naar <strong>Settings → Redirect URIs</strong> en voeg exact dit toe:<br>
        <div class="info-box green" style="margin-top:7px"><code>${esc(REDIRECT_URI)}</code></div>
      </div></div>
      <div class="step"><div class="step-n">3</div><div class="step-t">Kopieer je <strong>Client ID</strong> en plak hieronder.</div></div>
      <label>Client ID</label>
      <input id="cidInput" type="text" placeholder="Plak hier je Client ID…" value="${esc(S.clientId)}" autocomplete="off" spellcheck="false"/>
      <button class="btn full" id="loginBtn" ${S.loginBusy?'disabled':''}>
        ${S.loginBusy?'<span class="spinner"></span> Bezig…':'<span style="width:16px;height:16px;display:inline-block">'+spIcon+'</span> Inloggen met Spotify'}
      </button>
    </div>
  </div>`;
}

function renderApp(){
  return `
    <header>
      <div class="h-logo"><div class="h-logo-dot">${spIcon}</div>GenreSorter</div>
      <div class="h-right">
        ${S.user?.images?.[0]?.url?`<img src="${esc(S.user.images[0].url)}" alt=""/>`:''}
        <span>${esc(S.user?.display_name||'')}</span>
        <button class="btn ghost sm" id="logoutBtn">Uitloggen</button>
      </div>
    </header>
    <main>
      <div class="tabs">
        <button class="tab${S.tab==='playlists'?' active':''}" data-tab="playlists">Playlists</button>
        <button class="tab${S.tab==='genres'?' active':''}" data-tab="genres">Genre Analyse</button>
      </div>
      ${S.tab==='playlists'?renderPlaylists():renderGenres()}
    </main>`;
}

function renderPlaylists(){
  const filtered=S.playlists.filter(p=>!S.searchQ||p.name.toLowerCase().includes(S.searchQ.toLowerCase()));
  return `
    ${S.selected?`
    <div class="sel-panel">
      <div class="sec-label">Geselecteerd</div>
      <div class="row">
        ${S.selected.images?.[0]?.url?`<img src="${esc(S.selected.images[0].url)}" alt=""/>`:'<div class="no-img">🎵</div>'}
        <div style="flex:1"><div style="font-weight:500">${esc(S.selected.name)}</div><div style="color:var(--muted);font-size:.76rem">${S.selected.tracks?.total||0} nummers</div></div>
        <button class="btn" id="analyzeBtn" ${S.loading?'disabled':''}>
          ${S.loading?'<span class="spinner"></span> Bezig…':'▶ Analyseer'}
        </button>
      </div>
      ${S.loading?`<div class="prog"><div class="prog-fill" style="width:${S.progress}%"></div></div><div class="prog-msg">${esc(S.loadingMsg)}</div>`:''}
    </div>`:''}
    <div class="sec-label">Jouw playlists (${S.playlists.length})</div>
    <input id="plSearch" type="text" placeholder="Zoek playlist…" value="${esc(S.searchQ)}" style="max-width:250px;margin-bottom:15px"/>
    <div class="pl-grid">
      ${filtered.map(p=>`
        <div class="pl-card${S.selected?.id===p.id?' sel':''}" data-pid="${esc(p.id)}">
          ${S.selected?.id===p.id?'<div class="check">✓</div>':''}
          ${p.images?.[0]?.url?`<img src="${esc(p.images[0].url)}" loading="lazy" alt=""/>`:'<div class="no-img">🎵</div>'}
          <h4>${esc(p.name)}</h4>
          <p>${p.tracks?.total||0} nummers</p>
        </div>`).join('')}
    </div>`;
}

function renderGenres(){
  if(S.loading) return `<div class="empty"><div class="ico">🎵</div><div style="color:var(--muted);margin-bottom:13px">${esc(S.loadingMsg)}</div><div class="prog" style="max-width:260px;margin:0 auto"><div class="prog-fill" style="width:${S.progress}%"></div></div></div>`;
  const genres=Object.keys(S.genreMap);
  if(!genres.length) return `<div class="empty"><div class="ico">🎼</div><h3>Nog geen analyse</h3><p>Kies een playlist en klik op Analyseer.</p></div>`;

  const total=Object.values(S.genreMap).reduce((s,t)=>s+t.length,0);
  const filtered=S.activeGenre?{[S.activeGenre]:S.genreMap[S.activeGenre]}:Object.fromEntries(Object.entries(S.genreMap).filter(([g])=>!S.searchQ||g.toLowerCase().includes(S.searchQ.toLowerCase())));

  return `
    <div class="filter-row">
      <div class="chips-row">
        <div class="chip"><strong>${total}</strong> nummers</div>
        <div class="chip"><strong>${genres.length}</strong> genres</div>
        ${S.selected?`<div class="chip">📋 ${esc(S.selected.name)}</div>`:''}
      </div>
      <button class="btn" id="createAllBtn">+ Alles aanmaken (${genres.length})</button>
    </div>
    <input id="gSearch" type="text" placeholder="Zoek genre…" value="${esc(S.searchQ)}" style="max-width:230px;margin-bottom:9px"/>
    <div class="tags">
      <button class="tag${!S.activeGenre?' active':''}" data-genre="">Alle</button>
      ${genres.map(g=>`<button class="tag${S.activeGenre===g?' active':''}" data-genre="${esc(g)}">${esc(g)}</button>`).join('')}
    </div>
    <div class="genre-grid" style="margin-top:18px">
      ${Object.entries(filtered).map(([genre,tracks])=>`
        <div class="genre-card">
          <div class="genre-head">
            <div style="display:flex;align-items:center">
              <div class="genre-dot" style="background:${genreColor(genre)}"></div>
              <span class="genre-name">${esc(genre)}</span>
            </div>
            <span class="genre-cnt">${tracks.length}</span>
          </div>
          <div class="genre-tracks">
            ${tracks.slice(0,7).map(t=>`
              <div class="track-row">
                ${t.album?.images?.length?`<img src="${esc(t.album.images[t.album.images.length-1].url)}" alt=""/>`:'<div class="no-art"></div>'}
                <div class="track-info" style="flex:1;min-width:0">
                  <div class="name">${esc(t.name)}</div>
                  <div class="artist">${esc(t.artists?.map(a=>a.name).join(', '))}</div>
                </div>
              </div>`).join('')}
            ${tracks.length>7?`<div style="padding:5px 14px;color:var(--muted);font-size:.68rem">+${tracks.length-7} meer…</div>`:''}
          </div>
          <div class="genre-foot">
            <span>${tracks.length} nummers</span>
            <button class="btn sm" data-create="${esc(genre)}" ${S.creating===genre?'disabled':''}>
              ${S.creating===genre?'⏳':'+ Maak playlist'}
            </button>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderModal(){
  return `<div class="overlay" id="overlay">
    <div class="modal">
      <h3>Playlist aanmaken</h3>
      <p>Nieuwe playlist met <strong style="color:var(--text)">${S.modal.tracks.length}</strong> nummers in genre <strong style="color:var(--g)">${esc(S.modal.genre)}</strong>.</p>
      <label>Naam</label>
      <input id="plName" value="${esc(S.modal.name)}"/>
      <div class="modal-btns">
        <button class="btn" id="confirmCreate">Aanmaken</button>
        <button class="btn ghost" id="cancelModal">Annuleren</button>
      </div>
    </div>
  </div>`;
}

// ── Events ───────────────────────────────────────────────────────────
function attachEvents(){
  document.getElementById('cidInput')?.addEventListener('input',e=>S.clientId=e.target.value);
  document.getElementById('loginBtn')?.addEventListener('click',startLogin);
  document.getElementById('logoutBtn')?.addEventListener('click',()=>set({screen:'login',token:null,user:null,playlists:[],genreMap:{},selected:null}));
  document.getElementById('analyzeBtn')?.addEventListener('click',analyze);
  document.getElementById('plSearch')?.addEventListener('input',e=>set({searchQ:e.target.value}));
  document.getElementById('gSearch')?.addEventListener('input',e=>set({searchQ:e.target.value}));
  document.getElementById('createAllBtn')?.addEventListener('click',()=>{if(confirm('Alle '+Object.keys(S.genreMap).length+' playlists aanmaken?'))createAll();});
  document.getElementById('confirmCreate')?.addEventListener('click',()=>{const n=document.getElementById('plName')?.value?.trim();if(n)createPlaylist(S.modal.genre,S.modal.tracks,n);});
  document.getElementById('cancelModal')?.addEventListener('click',()=>set({modal:null}));
  document.getElementById('overlay')?.addEventListener('click',e=>{if(e.target.id==='overlay')set({modal:null});});

  document.querySelectorAll('.pl-card[data-pid]').forEach(c=>{
    c.addEventListener('click',()=>set({selected:S.playlists.find(p=>p.id===c.dataset.pid)}));
  });
  document.querySelectorAll('[data-tab]').forEach(b=>{
    b.addEventListener('click',()=>set({tab:b.dataset.tab,searchQ:'',activeGenre:null}));
  });
  document.querySelectorAll('.tag[data-genre]').forEach(b=>{
    b.addEventListener('click',()=>set({activeGenre:b.dataset.genre||null,searchQ:''}));
  });
  document.querySelectorAll('[data-create]').forEach(b=>{
    b.addEventListener('click',()=>{
      const genre=b.dataset.create;
      set({modal:{genre,tracks:S.genreMap[genre],name:(S.selected?.name||'')+' — '+genre}});
    });
  });
}

// ── Init ─────────────────────────────────────────────────────────────
handleCallback().then(render);
</script>

</body>
</html>
